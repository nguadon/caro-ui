<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caro Multiplayer</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
body { background:#1e1e2f;color:white;text-align:center;font-family:Arial;}
.grid { display:grid;grid-template-columns:repeat(10,50px);gap:5px;justify-content:center;margin-top:20px;}
.cell { width:50px;height:50px;background:#2a2a40;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;}
</style>
</head>

<body>

<h2>Caro Online</h2>
<h3 id="status">Đang kết nối...</h3>

<div class="grid" id="board"></div>

<script>
const socket = io("https://YOUR_RAILWAY_URL"); // 🔥 thay link backend

const params = new URLSearchParams(window.location.search);
const roomId = params.get("room") || "default";

let board = [];
let mySymbol = "";
let turn = 0;

socket.emit("join", roomId);

socket.on("init", data => {
  board = data.board;
  mySymbol = data.symbol;
  turn = data.turn;
  render();
});

socket.on("update", data => {
  board = data.board;
  turn = data.turn;
  render();
});

socket.on("win", data => {
  board = data.board;
  render();
  alert(data.symbol + " thắng!");
});

function render() {
  const div = document.getElementById("board");
  div.innerHTML = "";

  for(let i=0;i<10;i++){
    for(let j=0;j<10;j++){
      const c = document.createElement("div");
      c.className="cell";
      c.textContent = board[i][j] === "X" ? "❌" : board[i][j] === "O" ? "⭕" : "";

      c.onclick = () => {
        if(board[i][j]) return;
        if((mySymbol==="X" && turn!==0) || (mySymbol==="O" && turn!==1)) return;
        socket.emit("move", { roomId, x:i, y:j });
      };

      div.appendChild(c);
    }
  }

  document.getElementById("status").innerText =
    "Bạn: " + (mySymbol==="X"?"❌":"⭕") +
    " | Lượt: " + (turn===0?"❌":"⭕");
}
</script>

</body>
</html>
